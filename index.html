<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>InkFlow Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
              display: ['Cinzel', 'serif'],
            },
            colors: {
              paper: '#fdfbf7',
              ink: '#1a1a1a',
              accent: '#6366f1', // indigo-500
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-soft': 'pulse-soft 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'pulse-soft': {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: 0.6 },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        transition: background-color 0.5s ease, color 0.5s ease;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        background-color: #fdfbf7;
        color: #1a1a1a;
      }
      
      .paper-texture {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.05;
        background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        z-index: 1000;
      }

      /* Hide scrollbar for clean UI */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
      }
      
      .ui-no-select {
        -webkit-user-select: none;
        user-select: none;
      }

      button {
        -webkit-touch-callout: none;
      }

      .manuscript-shadow {
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
      }
      
      .dark .manuscript-shadow {
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      }

      /* Clean textarea for big pane focus */
      textarea {
        background: transparent;
        border: none;
        resize: none;
        outline: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.32.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.25",
    "react-textarea-autosize": "https://aistudiocdn.com/react-textarea-autosize@^8.5.9",
    "file-saver": "https://esm.sh/file-saver@^2.0.5",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "docx": "https://esm.sh/docx@^9.5.1"
  }
}
</script>
</head>
  <body class="bg-paper text-ink dark:bg-zinc-950 dark:text-zinc-200 transition-colors duration-500 overflow-x-hidden">
    <div class="paper-texture"></div>
    <div id="root"></div>
  </body>
</html>
